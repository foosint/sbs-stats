name: Update Database

on:
  schedule:
    - cron: "9,19,29,39,49,59 * * * *"
  workflow_dispatch: # allow manual trigger from GitHub UI

jobs:
  update-db:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # needed to commit back to repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Run data fetcher
        env:
          DB_PATH: data/sbs.db
        run: python scripts/fetch_and_update.py

      - name: Commit updated DB (if changed)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/sbs.db
          git diff --staged --quiet || git commit -m "chore: update sbs.db [skip ci]"
          git push
